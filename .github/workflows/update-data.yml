name: Update Hantavirus Data

on:
  schedule:
    # Run every hour at :05 minutes
    - cron: '5 * * * *'
  # Allow manual trigger
  workflow_dispatch:
  # Run on push to main branch
  push:
    branches: [main, master]

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser beautifulsoup4
      
      - name: Fetch hantavirus data
        run: |
          python fetch_hantavirus_data.py
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/data/hantavirus-data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update hantavirus data [$(date '+%Y-%m-%d %H:%M:%S UTC')]" && git push)
