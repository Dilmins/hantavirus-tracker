name: Update Hantavirus Data

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

concurrency:
  group: update-hantavirus
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Node dependencies
        run: npm install --legacy-peer-deps

      - name: Install d3 and topojson-client
        run: npm install d3 topojson-client --legacy-peer-deps

      - name: Build Vite app
        run: npm run build

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser beautifulsoup4

      - name: Fetch hantavirus data
        run: |
          python fetch_hantavirus_data.py
          echo "--- Checking output file ---"
          ls -la docs/data/ || echo "docs/data/ does not exist!"
          cat docs/data/hantavirus-data.json | head -5 || echo "File missing or empty!"

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          echo "--- Git status before add ---"
          git status

          git add -A

          echo "--- Git status after add ---"
          git status

          if git diff --staged --quiet; then
            echo "[skip] No changes to commit."
            exit 0
          fi

          git commit -m "chore: update hantavirus data [$(date -u '+%Y-%m-%d %H:%M UTC')]"

          for attempt in 1 2 3; do
            echo "[push] Attempt $attempt..."
            git pull --rebase origin main
            if git push origin main; then
              echo "[push] Success on attempt $attempt."
              exit 0
            fi
            echo "[push] Failed, retrying..."
            sleep $((attempt * 5))
          done

          echo "[push] All 3 attempts failed."
          exit 1
