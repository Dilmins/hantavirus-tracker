name: Update Hantavirus Data

on:
  schedule:
    # Every 15 minutes — keeps numbers as fresh as possible
    - cron: '*/15 * * * *'
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # ── Python setup ──────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser beautifulsoup4

      # ── Fetch live data FIRST (before build, so JSON is baked in) ─────────
      - name: Fetch hantavirus data
        run: python fetch_hantavirus_data.py

      # ── Node / Vite build ─────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Node dependencies
        run: npm install

      - name: Build Vite app
        run: npm run build

      # ── Commit & push ─────────────────────────────────────────────────────
      # Strategy: stash → pull --rebase → pop → commit → push
      # This avoids "index contains uncommitted changes" errors when two
      # workflow runs race each other.
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git add -A

          # Nothing changed? Skip.
          if git diff --staged --quiet; then
            echo "[skip] No changes to commit."
            exit 0
          fi

          # Stash staged + unstaged changes so rebase can run cleanly
          git stash --include-untracked

          # Pull any commits pushed by a concurrent run
          git pull --rebase origin main || git pull --rebase origin master

          # Restore our changes on top
          git stash pop

          # Stage again (stash pop may leave files unstaged)
          git add -A

          git commit -m "chore: update hantavirus data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
